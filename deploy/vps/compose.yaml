name: zero-x-da-market-bot

services:
  bot:
    build:
      context: ../..
      dockerfile: Dockerfile
    restart: unless-stopped
    init: true
    env_file:
      - .env
    ports:
      - "127.0.0.1:10001:10000"
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 30s
    healthcheck:
      test:
        - CMD
        - ruby
        - -rnet/http
        - -e
        - "uri = URI('http://127.0.0.1:10000/health'); exit(Net::HTTP.get_response(uri).is_a?(Net::HTTPSuccess) ? 0 : 1)"
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
