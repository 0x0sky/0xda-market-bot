name: Prepare GitHub release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Semantic version tag matching VERSION (for example v0.1.0)
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: prepare-release-${{ github.repository }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out the production branch
        uses: actions/checkout@v4
        with:
          ref: release
          fetch-depth: 0

      - name: Validate release metadata
        id: release
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail

          version="$(tr -d '[:space:]' < VERSION)"
          expected_tag="v${version}"
          if [[ ! "${RELEASE_TAG}" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "tag must be a stable SemVer tag such as v0.1.0" >&2
            exit 1
          fi
          if [[ "${RELEASE_TAG}" != "${expected_tag}" ]]; then
            echo "tag ${RELEASE_TAG} does not match VERSION (${expected_tag})" >&2
            exit 1
          fi

          notes_file="docs/releases/${RELEASE_TAG}.md"
          test -f "${notes_file}"
          grep -Fq "## [${version}]" CHANGELOG.md

          git fetch origin --tags --force
          release_commit="$(git rev-parse HEAD)"
          tag_exists=false
          if git rev-parse --verify --quiet "refs/tags/${RELEASE_TAG}^{commit}" >/dev/null; then
            tagged_commit="$(git rev-parse "refs/tags/${RELEASE_TAG}^{commit}")"
            if [[ "${tagged_commit}" != "${release_commit}" ]]; then
              echo "${RELEASE_TAG} already points to ${tagged_commit}, not release HEAD ${release_commit}" >&2
              exit 1
            fi
            tag_exists=true
          fi

          echo "tag=${RELEASE_TAG}" >> "${GITHUB_OUTPUT}"
          echo "notes_file=${notes_file}" >> "${GITHUB_OUTPUT}"
          echo "tag_exists=${tag_exists}" >> "${GITHUB_OUTPUT}"

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3.11"

      - name: Install dependencies
        run: bundle install

      - name: Run test suite
        run: bundle exec rake

      - name: Build production image
        run: docker build --tag 0xda-market-bot:${{ steps.release.outputs.tag }} .

      - name: Create annotated tag
        if: steps.release.outputs.tag_exists != 'true'
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag --annotate "${RELEASE_TAG}" --message "0xda Market Bot ${RELEASE_TAG}"
          git push origin "refs/tags/${RELEASE_TAG}"

      - name: Create draft GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          NOTES_FILE: ${{ steps.release.outputs.notes_file }}
        run: |
          set -euo pipefail
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "GitHub release ${RELEASE_TAG} already exists"
            exit 0
          fi
          gh release create "${RELEASE_TAG}" \
            --draft \
            --verify-tag \
            --title "0xda Market Bot ${RELEASE_TAG}" \
            --notes-file "${NOTES_FILE}"
