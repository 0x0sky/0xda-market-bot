name: CI

on:
  push:
    branches:
      - master
      - release
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.3.11
      - run: bundle install
      - name: Run tests
        shell: bash
        run: |
          set -o pipefail
          bundle exec rake 2>&1 | tee test.log
      - name: Upload test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-log
          path: test.log
      - run: docker build --tag 0xda-market-bot .
