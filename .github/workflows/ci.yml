name: CI

on:
  push:
    branches:
      - master
      - 'release*'
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.3.11
      - run: bundle install
      - name: Run tests
        id: tests
        run: |
          set -o pipefail
          bundle exec rake >test.log 2>&1 || {
            cat test.log
            exit 1
          }
      - name: Upload test failure log
        if: failure() && steps.tests.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: test-log
          path: test.log
          retention-days: 3
      - name: Validate VPS deployment configuration
        run: |
          bash -n deploy/vps/deploy.sh
          bash -n deploy/vps/run-price-digest.sh
          bash -n deploy/vps/install-systemd.sh
          bash test/vps_price_digest_test.sh
          cat >deploy/vps/.env <<'ENV'
          DEPLOY_ENV=development
          ENV
          docker compose --file deploy/vps/compose.yaml --env-file deploy/vps/.env config --quiet
      - run: docker build --tag 0xda-market-bot .
